name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: backend (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        # Windows is built/verified in the release workflow (it needs vcpkg
        # OpenSSL for SQLCipher's MSVC link); per-commit CI stays on Linux+macOS
        # where the toolchain is fast and reliable.
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src-tauri
    steps:
      - uses: actions/checkout@v4

      # SQLCipher (rusqlite bundled-sqlcipher) needs OpenSSL at build time; each
      # OS provides it differently and exports OPENSSL_DIR for the build script.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            build-essential pkg-config libssl-dev pandoc

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install pandoc openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install pandoc -y --no-progress
          $candidates = @($env:OPENSSL_ROOT_DIR, 'C:\Program Files\OpenSSL', 'C:\Program Files\OpenSSL-Win64')
          $dir = $candidates | Where-Object { $_ -and (Test-Path "$_\lib") } | Select-Object -First 1
          if (-not $dir) {
            choco install openssl -y --no-progress
            $dir = @('C:\Program Files\OpenSSL-Win64','C:\Program Files\OpenSSL') | Where-Object { Test-Path "$_\lib" } | Select-Object -First 1
          }
          echo "OPENSSL_DIR=$dir" >> $env:GITHUB_ENV
          echo "Using OPENSSL_DIR=$dir"

      # rust-toolchain.toml pins the channel (1.89); this installs it.
      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # tauri-build validates the `externalBin` sidecar at build time (even for
      # clippy/test), so the gitignored pandoc binary must be fetched first.
      - name: Fetch pandoc sidecar
        working-directory: ${{ github.workspace }}
        shell: bash
        run: bash scripts/fetch-pandoc.sh

      - name: Format check
        run: cargo fmt --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm exec vite build

  audit:
    name: supply-chain audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install pinned Rust toolchain
        run: rustup show
        working-directory: src-tauri
      - name: cargo audit
        # Advisory: surfaced in the log but non-blocking — several deps are
        # deliberately pinned (time/rusqlite/typst) and can't be freely bumped.
        run: |
          cargo install cargo-audit --locked
          cd src-tauri && cargo audit || true
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: pnpm audit (prod deps)
        run: pnpm audit --prod || true   # advisory: report, don't hard-fail the build

name: Release

# Tag a version (e.g. v0.1.0) to build installers for all desktop platforms and
# attach them to a GitHub Release.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest      # Apple Silicon
          - os: macos-13          # Intel
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # OpenSSL is needed to build SQLCipher (rusqlite bundled-sqlcipher).
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev build-essential \
            pkg-config libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl@3
          echo "OPENSSL_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

      - name: Install OpenSSL via vcpkg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # vcpkg (preinstalled on the runner) gives a libcrypto.lib the MSVC
          # linker can find — the bundled Win64 OpenSSL's layout is unreliable.
          & "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install openssl:x64-windows-static-md
          $dir = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows-static-md"
          echo "OPENSSL_DIR=$dir" >> $env:GITHUB_ENV
          echo "OPENSSL_STATIC=1" >> $env:GITHUB_ENV

      - name: Install pinned Rust toolchain
        run: rustup show

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Bundle the pandoc sidecar (gitignored) for this OS before building.
      - name: Fetch pandoc sidecar
        shell: bash
        run: bash scripts/fetch-pandoc.sh

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # --- Code signing (optional; set as repo secrets to enable) ---
          # Windows: TAURI_SIGNING_PRIVATE_KEY / _PASSWORD, or an Authenticode cert.
          # macOS: APPLE_CERTIFICATE, APPLE_CERTIFICATE_PASSWORD, APPLE_SIGNING_IDENTITY,
          #        APPLE_ID, APPLE_PASSWORD, APPLE_TEAM_ID (for notarization).
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "pwn2report ${{ github.ref_name }}"
          releaseDraft: true
          prerelease: false
